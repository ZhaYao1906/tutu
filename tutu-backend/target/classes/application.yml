server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/tutu_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  sql:
    init:
      mode: always
      continue-on-error: true

jwt:
  secret: tutu_jwt_secret_key_2024_must_be_at_least_256_bits_long_for_HMAC_SHA256
  expiration: 604800000

logging:
  level:
    com.tutu: debug
    org.hibernate.SQL: debug